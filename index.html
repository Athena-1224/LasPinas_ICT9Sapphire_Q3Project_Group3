<!DOCTYPE html>
<html>
<head>
    <title>Destiny Finder Fare Guide - LRT Line 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("https://i.pinimg.com/1200x/ff/d1/e5/ffd1e53016f61606cc39af894bd17411.jpg");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
        }

        .glass-box{
            background: rgba(0,0,0,0.6);
            padding:40px;
            border-radius:20px;
            margin-top:60px;
        }

        .fare-display{
            background: rgb(173, 216, 230);
            padding:40px;
            border-radius:20px;
            text-align:center;
            color:black;
        }

        .fare-display h1{
            font-size:50px;
        }

        .btn-warning,
        .btn-secondary{
            background-color: rgb(173, 216, 230);
            border: none;
            color: black;
        }
    </style>
</head>
<body>

<div class="container glass-box">

    <h2 class="text-center mb-4">
        <span style="color: rgb(173, 216, 230); font-weight:bold;">
            Destiny Finder
        </span> Fare Guide  
        <br> LRT Line 2 (Santolan – Recto)
    </h2>

    <p class="text-center">
        Base Fare: ₱50 (first 2KM included) | ₱15 per KM after 2KM  
        <br> 20% Discount for Senior, PWD & Students
    </p>

    <div class="row mt-4">

        <div class="col-md-6">

            <label>Pick-Up Location:</label>
            <select id="pickup" class="form-control mb-3">
                <option value="0">Santolan</option>
                <option value="1">Katipunan</option>
                <option value="2">Anonas</option>
                <option value="3">Araneta Center-Cubao</option>
                <option value="4">Betty Go-Belmonte</option>
                <option value="5">Gilmore</option>
                <option value="6">J. Ruiz</option>
                <option value="7">V. Mapa</option>
                <option value="8">Pureza</option>
                <option value="9">Legarda</option>
                <option value="10">Recto</option>
            </select>

            <label>Drop-Off Location:</label>
            <select id="dropoff" class="form-control mb-3">
                <option value="0">Santolan</option>
                <option value="1">Katipunan</option>
                <option value="2">Anonas</option>
                <option value="3">Araneta Center-Cubao</option>
                <option value="4">Betty Go-Belmonte</option>
                <option value="5">Gilmore</option>
                <option value="6">J. Ruiz</option>
                <option value="7">V. Mapa</option>
                <option value="8">Pureza</option>
                <option value="9">Legarda</option>
                <option value="10">Recto</option>
            </select>

            <button class="btn btn-warning"
                onclick="computeFare(false)">
                Regular Fare
            </button>

            <button class="btn btn-secondary"
                onclick="computeFare(true)">
                Discounted Fare
            </button>

        </div>

        <div class="col-md-6">
            <div class="fare-display">
                <h4>Fare:</h4>
                <h1 id="result">₱ 0.00</h1>
            </div>
        </div>

    </div>

</div>

<script>

let baseFare = 50;
let perKMrate = 15;
let baseKM = 2;

function computeFare(isDiscounted){

    let pickup = Number(document.getElementById("pickup").value);
    let dropoff = Number(document.getElementById("dropoff").value);

    let distance = Math.abs(dropoff - pickup);

    let totalFare;

    if(distance <= baseKM){
        totalFare = baseFare;
    } else {
        let extraKM = distance - baseKM;
        totalFare = baseFare + (extraKM * perKMrate);
    }

    if(isDiscounted){
        totalFare = totalFare * 0.80;
    }

    totalFare = Math.round(totalFare * 100) / 100;

    document.getElementById("result").innerHTML =
        "₱ " + totalFare;
}

</script>

</body>
</html>
